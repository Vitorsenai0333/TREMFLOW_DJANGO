<h1>Produtos</h1>

<a href="{% url 'criar_produto' %}">Novo Produto</a>

<ul>
    {% for produto in produtos %}
        <li>
            {{ produto.nome }} - R$ {{ produto.preco }} - Qtd: {{ produto.quantidade }}

            <a href="{% url 'editar_produto' produto.id %}">Editar</a>
            <a href="{% url 'deletar_produto' produto.id %}">Deletar</a>
        </li>
    {% endfor %}
</ul>
